<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resend Email Test</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#1e293b;
  padding:30px;
  border-radius:10px;
  width:350px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h2{
  text-align:center;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  background:#6366f1;
  border:none;
  border-radius:6px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#4f46e5;
}

#status{
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">
<h2>Email Test</h2>

<form id="emailForm">

<input type="email" id="to" placeholder="Recipient Email" required>

<input type="text" id="subject" placeholder="Subject" required>

<textarea id="message" placeholder="Message" rows="4" required></textarea>

<button type="submit">Send Email</button>

</form>

<p id="status"></p>

</div>

<script>

const form = document.getElementById("emailForm");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {

e.preventDefault();

status.innerText = "Sending...";

const data = {
  to: document.getElementById("to").value,
  subject: document.getElementById("subject").value,
  message: document.getElementById("message").value
};

try{

const res = await fetch("/api/send",{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body: JSON.stringify(data)
});

const result = await res.json();

if(res.ok){
  status.innerText = "✅ Email Sent!";
}else{
  status.innerText = "❌ Error: " + result.error;
}

}catch(err){
status.innerText = "❌ Failed to send";
}

});

</script>

</body>
</html>
